    <!-- Firebase SDKs (load first) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/firebase-service.js"></script>
    <script src="js/storage-service.js"></script>
    <script src="js/main.js"></script>
    <script src="js/support-chat.js?v=4.0"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            let userStr = sessionStorage.getItem('currentStudent');
            if (!userStr) { window.location.href = 'index.html'; return; }

            let user = JSON.parse(userStr);
            document.getElementById('userNameDisplay').textContent = user.name;
            const grades = {'prep1':'√śŠž ŇŕŌ«ŌŪ','prep2':' «šŪ… ŇŕŌ«ŌŪ','prep3':' «Š … ŇŕŌ«ŌŪ','sec1':'√śŠž ň«šśŪ'};
            document.getElementById('userGradeDisplay').textContent = grades[user.grade] || 'ō«Š»';

            // Sync user from Firebase
            let dbUser = JSON.parse(localStorage.getItem(`db_${user.phone}`)) || { courses: [] };
            try {
                if (window.FirebaseService && typeof window.FirebaseService.getUser === 'function') {
                    const onlineUser = await window.FirebaseService.getUser(user.phone);
                    if (onlineUser) { dbUser = onlineUser; localStorage.setItem(`db_${user.phone}`, JSON.stringify(dbUser)); }
                }
            } catch(e) {}

            // Sync courses from Firebase
            try {
                if (window.FirebaseService && typeof window.FirebaseService.getCourses === 'function') {
                    const onlineCourses = await window.FirebaseService.getCourses();
                    if (onlineCourses && onlineCourses.length > 0) localStorage.setItem('adminCourses', JSON.stringify(onlineCourses));
                }
            } catch(e) {}

            const container = document.getElementById('hwListContainer');
            const emptyState = document.getElementById('noHwState');

            if (dbUser.courses && dbUser.courses.length > 0) {
                container.style.display = 'block';
                emptyState.style.display = 'none';
                let adminCourses = JSON.parse(localStorage.getItem('adminCourses')) || [];

                dbUser.courses.forEach(cId => {
                    const c = adminCourses.find(course => course.id === cId);
                    if (!c) return;
                    // Collect real homeworks from course contents
                    const homeworks = (c.contents && c.contents.homeworks) ? c.contents.homeworks : [];
                    const row = document.createElement('div');
                    row.className = 'course-hw-row';
                    const hwItems = homeworks.length > 0
                        ? homeworks.map(hw => `<div class="hw-item"><span style="font-weight:bold">${hw.title || 'ś«Ő»'}</span><a href="${hw.link || '#'}" target="_blank" class="btn btn-outline" style="padding:4px 12px;font-size:0.85rem;"><i class="fas fa-external-link-alt"></i> › Õ</a></div>`).join('')
                        : `<div class="empty-message">Š« ŪśŐŌ ś«Ő»«  ›Ū Ś–« «ŠŖś—” »ŕŌ</div>`;
                    row.innerHTML = `
                        <div class="course-hw-header">
                            <div style="display:flex;align-items:center;gap:15px;">
                                <i class="fas fa-book text-gold" style="font-size:1.5rem;"></i>
                                <h3 style="margin:0;color:var(--text-primary);">${c.title}</h3>
                            </div>
                            <button class="btn btn-outline toggle-btn">√ŔŚ— ś«Ő»« Ū <i class="fas fa-chevron-down" style="margin-right:8px;"></i></button>
                        </div>
                        <div class="course-hw-body">
                            <div class="hw-category">
                                <h4 style="color:var(--accent-cyan);"><i class="fas fa-tasks"></i> ś«Ő»«  «ŠŖś—”</h4>
                                ${hwItems}
                            </div>
                        </div>`;
                    const toggleBtn = row.querySelector('.toggle-btn');
                    toggleBtn.addEventListener('click', () => {
                        row.classList.toggle('active');
                        toggleBtn.innerHTML = row.classList.contains('active')
                            ? '√ő›Ų ś«Ő»« Ū <i class="fas fa-chevron-up" style="margin-right:8px;"></i>'
                            : '√ŔŚ— ś«Ő»« Ū <i class="fas fa-chevron-down" style="margin-right:8px;"></i>';
                    });
                    container.appendChild(row);
                });
            } else {
                container.style.display = 'none';
                emptyState.style.display = 'block';
            }

            const logoutBtn = document.getElementById('logoutBtn');
            if (logoutBtn) logoutBtn.addEventListener('click', e => { e.preventDefault(); sessionStorage.removeItem('currentStudent'); window.location.href = 'index.html'; });
        });
    </script>
