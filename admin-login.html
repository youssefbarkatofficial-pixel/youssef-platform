<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>يوسف بركات</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            background-color: var(--deep-black);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px;
        }

        .admin-login-container {
            width: 100%;
            max-width: 450px;
            background: var(--glass-bg);
            border: 1px solid var(--royal-gold);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), inset 0 0 0 1px rgba(255, 215, 0, 0.1);
            backdrop-filter: blur(20px);
            position: relative;
            overflow: hidden;
        }

        .admin-login-container::before {
            content: '';
            position: absolute;
            top: -50px;
            left: -50px;
            width: 150px;
            height: 150px;
            background: radial-gradient(circle, var(--royal-gold) 0%, transparent 70%);
            opacity: 0.1;
            border-radius: 50%;
        }

        .admin-login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .admin-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, var(--royal-gold), #B8860B);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            color: var(--deep-black);
            margin: 0 auto 20px;
            box-shadow: 0 10px 20px rgba(212, 175, 55, 0.2);
        }

        .admin-title {
            color: var(--royal-gold);
            font-size: 1.8rem;
            margin-bottom: 10px;
            font-weight: 800;
        }

        .admin-subtitle {
            color: #ccc;
            font-size: 0.9rem;
        }

        .form-group {
            margin-bottom: 20px;
            position: relative;
        }

        .form-group i {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--royal-gold);
        }

        .form-control {
            width: 100%;
            padding: 15px 45px 15px 15px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            color: var(--soft-white);
            font-family: inherit;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            border-color: var(--royal-gold);
            outline: none;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.2);
        }

        .btn-admin {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, var(--royal-gold), #B8860B);
            color: var(--deep-black);
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .btn-admin:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(212, 175, 55, 0.3);
        }

        .error-message {
            color: #ff4757;
            background: rgba(255, 71, 87, 0.1);
            padding: 10px;
            border-radius: 8px;
            font-size: 0.9rem;
            text-align: center;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 71, 87, 0.3);
            display: none;
        }

        /* Particles effect background */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="particles">
        <!-- Floating particles background (mock) -->
    </div>

    <div class="admin-login-container">
        <div class="admin-login-header">
            <div class="admin-icon">
                <i class="fas fa-crown"></i>
            </div>
            <h1 class="admin-title">لوحة تحكم الإدارة</h1>
            <p class="admin-subtitle">الوصول مسموح فقط لمالك المنصة</p>
        </div>

        <div id="adminLoginError" class="error-message"></div>

        <form id="adminLoginForm">
            <div class="form-group">
                <i class="fas fa-envelope"></i>
                <input type="email" id="adminEmail" class="form-control" placeholder="البريد الإلكتروني للإدارة" required autocomplete="email">
            </div>
            
            <div class="form-group">
                <i class="fas fa-lock"></i>
                <input type="password" id="adminPassword" class="form-control" placeholder="كلمة المرور" required autocomplete="current-password">
            </div>

            <button type="submit" class="btn-admin">تسجيل الدخول</button>
            
        </form>
    </div>

    <script src="js/storage-service.js"></script>
    <script src="js/main.js"></script>
    <script src="js/admin-auth.js?v=3"></script>
    <script src="js/support-chat.js?v=3.0"></script>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/firebase-service.js"></script>
</body>
</html>
