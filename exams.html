<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الامتحانات - يوسف بركات</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <style>
        .course-exam-row {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            margin-bottom: 15px;
            overflow: hidden;
            transition: var(--transition-smooth);
        }
        .course-exam-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
        }
        .course-exam-body {
            display: none;
            padding: 20px;
            border-top: 1px solid rgba(255,255,255,0.05);
            background: rgba(0,0,0,0.2);
        }
        .course-exam-row.active .course-exam-body {
            display: block;
        }
        .exam-category {
            margin-bottom: 25px;
        }
        .exam-category h4 {
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .exam-item {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 15px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .empty-message {
            color: rgba(255,255,255,0.5);
            font-style: italic;
            padding: 10px;
            text-align: center;
            background: rgba(0,0,0,0.1);
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <div class="bg-effects"></div>

    <header class="navbar glass-panel" >
        <a href="index.html" class="nav-brand">
            <div class="logo-circle" style="width: 40px; height: 40px; font-size: 1.2rem;">ي</div>
            <span class="nav-brand-text">منصة يوسف بركات</span>
        </a>
        <div class="nav-actions">
            <a href="#" class="btn btn-outline" style="padding: 8px 15px; border-radius: 20px;"><i class="fas fa-bell"></i></a>
            <a href="#" id="logoutBtn" class="btn btn-outline" style="border-color: #e74c3c; color: #e74c3c; padding: 8px 15px; border-radius: 20px;">خروج <i class="fas fa-sign-out-alt"></i></a>
            <div class="mobile-menu-btn"><i class="fas fa-bars"></i></div>
        </div>
    </header>

    <div class="dashboard-layout">
        <aside class="sidebar" id="sidebar">
            <div class="user-profile-mini">
                <div class="avatar" style="overflow: hidden;">
                    <img id="userAvatarImg" src="https://via.placeholder.com/80/071326/D4A64F?text=%D8%B7%D8%A7%D9%84%D8%A8" style="width: 100%; height: 100%; object-fit: cover;">
                </div>
                <h4 id="userNameDisplay">طالب</h4>
                <p id="userGradeDisplay">الصف الدراسي</p>
            </div>
            <ul class="sidebar-nav">
                <li><a href="dashboard.html"><i class="fas fa-home"></i> لوحة التحكم</a></li>
                <li><a href="profile.html"><i class="fas fa-user"></i> حسابي</a></li>
                <li><a href="courses.html"><i class="fas fa-plus-circle"></i> اشتراك في كورسات</a></li>
                <li><a href="my-courses.html"><i class="fas fa-video"></i> كورساتي</a></li>
                <li><a href="homeworks.html"><i class="fas fa-tasks"></i> الواجبات</a></li>
                <li><a href="exams.html" class="active"><i class="fas fa-clipboard-list"></i> الامتحانات</a></li>
                <li><a href="stats.html"><i class="fas fa-chart-line"></i> الإحصائيات</a></li>
                <li><a href="settings.html"><i class="fas fa-cog"></i> الإعدادات</a></li>
            </ul>
        </aside>

        <main class="main-content">
            <div class="page-header">
                <h1 class="page-title"><i class="fas fa-clipboard-list mr-2 text-gold"></i> امتحاناتي</h1>
            </div>

            <div class="glass-panel dash-panel" style="min-height: 400px;">
                <div id="examListContainer">
                    <!-- Exam rows will be rendered here -->
                </div>

                <div id="noExamState" style="display: none; text-align: center; padding: 50px 20px;">
                    <i class="fas fa-book-reader text-gold" style="font-size: 4rem; margin-bottom: 20px; opacity: 0.5;"></i>
                    <h2 style="color: var(--soft-white); margin-bottom: 10px;">لا يوجد كورسات مشترك فيها بعد</h2>
                    <p style="color: rgba(255,255,255,0.7); margin-bottom: 20px;">اشترك في الكورسات أولاً لتظهر لك الامتحانات الخاصة بها</p>
                    <a href="courses.html" class="btn btn-gold btn-large">استكشف الكورسات</a>
                </div>
            </div>
        </main>
    </div>

    <script src="js/storage-service.js"></script>
    <script src="js/main.js"></script>
    <script src="js/support-chat.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            let userStr = sessionStorage.getItem('currentStudent');
            if(!userStr) {
                window.location.href = 'index.html';
                return;
            }
            
            let user = JSON.parse(userStr);
            document.getElementById('userNameDisplay').textContent = user.name;
            const grades = {'prep1':'أولى إعدادي', 'prep2':'تانية إعدادي', 'prep3':'تالتة إعدادي', 'sec1':'أولى ثانوي'};
            document.getElementById('userGradeDisplay').textContent = grades[user.grade] || 'طالب';
            
            let dbUser = JSON.parse(localStorage.getItem(`db_${user.phone}`)) || { courses: [] };
            const container = document.getElementById('examListContainer');
            const emptyState = document.getElementById('noExamState');
            
            if(dbUser.courses && dbUser.courses.length > 0) {
                container.style.display = 'block';
                emptyState.style.display = 'none';
                
                let adminCourses = JSON.parse(localStorage.getItem('adminCourses')) || [];
                
                dbUser.courses.forEach(cId => {
                    const c = adminCourses.find(course => course.id === cId);
                    if(c) {
                        const row = document.createElement('div');
                        row.className = 'course-exam-row';
                        
                        row.innerHTML = `
                            <div class="course-exam-header">
                                <div style="display: flex; align-items: center; gap: 15px;">
                                    <i class="fas fa-star text-gold" style="font-size: 1.5rem;"></i>
                                    <h3 style="margin: 0; color: var(--text-primary);">${c.title}</h3>
                                </div>
                                <button class="btn btn-outline toggle-btn">أظهر امتحاناتي <i class="fas fa-chevron-down ml-2" style="margin-right: 8px;"></i></button>
                            </div>
                            <div class="course-exam-body">
                                <div class="exam-category">
                                    <h4 style="color: #2ecc71;"><i class="fas fa-check-circle"></i> الامتحانات المنتهية</h4>
                                    <div class="exam-item">
                                        <span style="font-weight: bold;">اختبار شامل على الوحدة الأولى</span>
                                        <span class="badge" style="background: rgba(46, 204, 113, 0.2); color: #2ecc71;">الدرجة: 19/20</span>
                                    </div>
                                </div>
                                
                                <div class="exam-category">
                                    <h4 style="color: #e74c3c;"><i class="fas fa-exclamation-circle"></i> امتحانات متأخرة (لم تُمتحن)</h4>
                                    <!-- Dynamic Missing State -->
                                    <div class="empty-message" style="color: #2ecc71; border: 1px dashed #2ecc71;">أشطر شطور مفيش امتحان فاتك! 🌟</div>
                                </div>

                                <div class="exam-category">
                                    <h4 style="color: var(--accent-cyan);"><i class="fas fa-clock"></i> امتحانات مستقبلية</h4>
                                    <div class="empty-message">لا يوجد أية امتحانات مستقبلية حتى الآن</div>
                                </div>
                            </div>
                        `;
                        
                        const toggleBtn = row.querySelector('.toggle-btn');
                        toggleBtn.addEventListener('click', () => {
                            row.classList.toggle('active');
                            if(row.classList.contains('active')) {
                                toggleBtn.innerHTML = `أخفِ امتحاناتي <i class="fas fa-chevron-up ml-2" style="margin-right: 8px;"></i>`;
                            } else {
                                toggleBtn.innerHTML = `أظهر امتحاناتي <i class="fas fa-chevron-down ml-2" style="margin-right: 8px;"></i>`;
                            }
                        });
                        
                        container.appendChild(row);
                    }
                });
            } else {
                container.style.display = 'none';
                emptyState.style.display = 'block';
            }
        });
    </script>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/firebase-service.js"></script>
</body>
</html>
