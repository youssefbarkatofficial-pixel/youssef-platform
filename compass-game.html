<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صِراع البوصلة - المنصة التعليمية</title>
    <!-- تضمين ستايل المنصة الأساسي للحفاظ على الهوية -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <!-- Firebase (إذا أردنا تمرير التوكن مستقبلاً) -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="js/firebase-config.js"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100vh;
            overflow: hidden; /* لمنع التمرير الخارجي، اللعبة تغطي الشاشة */
            background-color: #000;
        }
        #game-frame {
            width: 100%;
            height: 100%;
            border: none;
        }
        .back-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 9999;
            background-color: rgba(15, 23, 42, 0.8);
            color: #D4AF37;
            border: 1px solid #D4AF37;
            padding: 10px 20px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.5);
            transition: 0.3s;
        }
        .back-btn:hover {
            background-color: #D4AF37;
            color: #000;
        }
    </style>
</head>
<body>
    
    <!-- زر العودة للمنصة -->
    <a href="dashboard.html" class="back-btn">
        <i class="fas fa-arrow-right"></i> العودة للمنصة
    </a>

    <!-- إطار اللعبة المدمج -->
    <iframe id="game-frame" src="compass_clash/build/web/index.html"></iframe>

    <script>
        // التحقق من تسجيل الدخول (نفس Auth المنصة)
        firebase.auth().onAuthStateChanged((user) => {
            if (!user) {
                // إذا كان الطالب كزائر، نوجهه لتسجيل الدخول أولاً كما ينص القانون
                window.location.href = 'login.html?redirect=compass-game.html';
            } else {
                console.log("الطالب مسجل دخول، يمكنه اللعب:", user.email);
                // مستقبلاً يمكننا إرسال رسالة عبر postMessage للـ iframe لإبلاغ Flutter بمن هو المستخدم!
            }
        });
    </script>
</body>
</html>
